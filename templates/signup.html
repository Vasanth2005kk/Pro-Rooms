{% extends "base.html" %}

{% block content %}
<div class="container flex items-center justify-center" style="min-height: calc(100vh - 100px);">
    <div class="glass-card p-4 animate-scale-up" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white mb-2">Create Account</h2>
            <p class="text-white-50">Join the Pro Rooms community today</p>
        </div>

        <form action="{{ url_for('signup') }}" method="POST">
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <label class="form-label small">Username</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-tag"></i>
                        </span>
                        <input type="text" name="username" class="form-control" placeholder="johndoe" required
                            value="{{ username }}">
                    </div>
                </div>

                <div class="col-span-2">
                    <label class="form-label small">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" name="email" class="form-control" placeholder="john@example.com" required
                            value="{{ email }}">
                    </div>
                </div>

                <div class="col-span-1">
                    <label class="form-label small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="col-span-1">
                    <label class="form-label small">Confirm</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-check-double"></i>
                        </span>
                        <input type="password" name="ConfirmPassword" class="form-control" placeholder="••••••••"
                            required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full py-3 mt-4 mb-4">
                Sign Up
            </button>
        </form>

        <div class="divider">
            <span class="divider-text">OR</span>
        </div>

        <div class="flex flex-col gap-3 mb-4">
            <a href="{{ url_for('google_login') }}"
                class="btn btn-outline-light flex items-center justify-center gap-2 py-3">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="20" alt="Google">
                Sign up with Google
            </a>
        </div>

        <div class="text-center text-white-50 small">
            Already have an account? <a href="{{ url_for('login') }}"
                class="text-primary text-decoration-none fw-bold">Login</a>
        </div>
    </div>
</div>
{% endblock %}

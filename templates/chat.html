{% extends "base.html" %}

{% block content %}
<div class="chat-wrapper">
    <!-- Chat Sidebar / Info — hidden on mobile, shown on desktop -->
    <div class="chat-sidebar d-md-flex flex-column p-3">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('dashboard') }}" class="btn btn-dark btn-sm me-3">
                <i class="fas fa-chevron-left"></i>
            </a>
            <h4 class="mb-0">Rooms</h4>
        </div>
        <div class="room-info mb-4">
            <h5 class="text-primary">{{ room.name }}</h5>
            <p class="text-white-50 small">{{ room.description }}</p>
            {% if room.topic %}
            <span class="badge bg-secondary mb-2">{{ room.topic }}</span>
            {% endif %}
        </div>
        <hr>
        <div class="members-list flex-grow-1">
            <h6 class="text-uppercase small text-white-50 mb-3">Online Now</h6>
            <div class="d-flex align-items-center mb-2">
                <div class="status-indicator online me-2"></div>
                <span>You</span>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-main d-flex flex-column">
        <!-- Header -->
        <div class="chat-header p-3 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <!-- Back button — mobile only -->
                <button class="btn btn-link d-md-none text-white me-2 p-0" onclick="window.location.href='/dashboard'">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="room-avatar me-3">
                    <i class="fas fa-users text-primary"></i>
                </div>
                <div>
                    <h5 class="mb-0">{{ room.name }}</h5>
                    <span class="text-success small">Active</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-link text-white-50"><i class="fas fa-search"></i></button>
                <button class="btn btn-link text-white-50"><i class="fas fa-ellipsis-v"></i></button>
            </div>
        </div>

        <!-- Messages area -->
        <div class="messages-container p-4 flex-grow-1" id="messages-container">
            <div class="text-center my-5 text-white-50">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Loading messages...
            </div>
        </div>

        <!-- Input area -->
        <div class="chat-input-area p-3">
            <form id="chat-form" class="chat-form d-flex gap-2">
                <button type="button" class="btn btn-link text-white-50 p-0">
                    <i class="far fa-smile fa-lg"></i>
                </button>
                <button type="button" class="btn btn-link text-white-50 p-0">
                    <i class="fas fa-paperclip fa-lg"></i>
                </button>
                <div class="flex-grow-1 input-group">
                    <input type="text" id="message-input" class="form-control chat-input"
                        placeholder="Type a message..." autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary btn-send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>
</div>

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
{% endblock %}

<script>
    const roomId = "{{ room.id }}";
    const msgContainer = document.getElementById('messages-container');
    const chatForm = document.getElementById('chat-form');
    const msgInput = document.getElementById('message-input');

    async function loadMessages() {
        try {
            const res = await fetch(`/api/chat/${roomId}`);
            const messages = await res.json();

            msgContainer.innerHTML = '';
            if (messages.length === 0) {
                msgContainer.innerHTML = '<div class="text-center text-white-50 my-5">No messages yet. Start the conversation!</div>';
                return;
            }

            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.is_me ? 'message-out' : 'message-in'} animate-slide-up`;
                msgDiv.innerHTML = `
                ${!msg.is_me ? `<div class="small fw-bold text-primary mb-1">${msg.author_name}</div>` : ''}
                <div class="message-text">${msg.content}</div>
                <span class="message-meta">${msg.timestamp}</span>
            `;
                msgContainer.appendChild(msgDiv);
            });

            msgContainer.scrollTop = msgContainer.scrollHeight;
        } catch (err) {
            console.error("Error loading messages:", err);
        }
    }

    chatForm.onsubmit = async (e) => {
        e.preventDefault();
        const content = msgInput.value.trim();
        if (!content) return;

        msgInput.value = '';

        try {
            const res = await fetch(`/api/chat/${roomId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });

            if (res.ok) {
                loadMessages();
            }
        } catch (err) {
            console.error("Error sending message:", err);
        }
    };

    // Polling for new messages every 3 seconds
    setInterval(loadMessages, 3000);
    loadMessages();
</script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container flex items-center justify-center" style="min-height: calc(100vh - 100px);">
    <div class="glass-card p-4 animate-scale-up" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white mb-2">Welcome Back</h2>
            <p class="text-white-50">Please login to your account</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label class="form-label small">Username or Email</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" name="identifier" class="form-control" placeholder="your_name@example.com"
                        required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label small">Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 small">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="rememberMe">
                    <label class="text-white-50" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <a href="#" class="text-primary text-decoration-none">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-full py-3 mb-4">
                Login
            </button>
        </form>

        <div class="divider">
            <span class="divider-text">OR</span>
        </div>

        <div class="flex flex-col gap-3 mb-4">
            <a href="{{ url_for('google_login') }}"
                class="btn btn-outline-light flex items-center justify-center gap-2 py-3">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="20" alt="Google">
                Continue with Google
            </a>
        </div>

        <div class="text-center text-white-50 small">
            Don't have an account? <a href="{{ url_for('signup') }}"
                class="text-primary text-decoration-none fw-bold">Sign up</a>
        </div>
    </div>
</div>
{% endblock %}

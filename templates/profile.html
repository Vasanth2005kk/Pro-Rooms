{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-center">
        <div class="profile-form-wrapper w-100">
            <div class="glass-card p-4 animate-fade-in">
                <!-- Profile Header -->
                <div class="d-flex align-items-center mb-4">
                    <div class="profile-img-container me-3">
                        <img src="{{ current_user.picture if current_user.picture else url_for('static', filename='img/default-avatar.png') }}"
                            alt="Profile" id="profile-preview" class="profile-img-large">
                        <div class="profile-img-overlay">
                            <i class="fas fa-camera"></i>
                        </div>
                    </div>
                    <div>
                        <h2 class="mb-0">{{ current_user.username or current_user.name or 'Anonymous' }}</h2>
                        <p class="text-white-50 mb-0">{{ current_user.email }}</p>
                    </div>
                </div>

                <!-- Profile Form -->
                <form method="POST" action="{{ url_for('profile') }}">
                    <div class="row g-3">
                        <!-- Basic Info -->
                        <div class="col-md-6">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control"
                                value="{{ current_user.username or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ current_user.email }}">
                        </div>

                        <!-- Bio -->
                        <div class="col-12">
                            <label class="form-label">Bio</label>
                            <textarea name="bio" class="form-control" rows="3"
                                placeholder="Tell us about yourself...">{{ current_user.bio }}</textarea>
                        </div>

                        <!-- Profile Picture URL -->
                        <div class="col-12">
                            <label class="form-label">Profile Picture URL</label>
                            <input type="url" name="picture_url" class="form-control" id="picture-url-input"
                                placeholder="https://example.com/photo.jpg" value="{{ current_user.picture }}">
                        </div>

                        <!-- Social Links -->
                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="fab fa-github me-1"></i> GitHub
                            </label>
                            <input type="text" name="github" class="form-control" placeholder="GitHub Username"
                                value="{{ current_user.github }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="fab fa-linkedin me-1"></i> LinkedIn
                            </label>
                            <input type="text" name="linkedin" class="form-control" placeholder="LinkedIn Profile"
                                value="{{ current_user.linkedin }}">
                        </div>

                        <!-- Submit -->
                        <div class="col-12 mt-4 d-grid">
                            <button type="submit" class="btn btn-primary py-3">
                                <i class="fas fa-save me-2"></i> Save Changes
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('picture-url-input').addEventListener('input', function (e) {
        const preview = document.getElementById('profile-preview');
        if (e.target.value) preview.src = e.target.value;
    });
</script>
{% endblock %}

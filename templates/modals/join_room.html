<!-- Join Room / Password Modal -->
<div class="modal fade" id="joinRoomModal" tabindex="-1" aria-labelledby="joinRoomModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 450px;">
        <div class="modal-content border-secondary shadow-lg">
            <div class="modal-header border-secondary d-flex align-items-center justify-content-between">
                <h5 class="modal-title text-white mb-0"><i class="fas fa-lock me-2"></i>Private Room Access</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    style="margin: 0;"></button>
            </div>
            <div class="modal-body bg-dark text-center p-4">
                <div class="mb-4">
                    <div class="room-avatar mx-auto mb-3" style="width: 60px; height: 60px; font-size: 1.5rem;">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h4 class="text-white mb-2" id="joinRoomName"></h4>
                    <p class="text-muted small">This community is private. Please enter the 6-digit access code to
                        continue.</p>
                </div>

                <div class="d-flex justify-content-center gap-2 mb-4" id="passcodeInputs">
                    <input type="text"
                        class="form-control passcode-input text-center bg-dark text-primary border-secondary fw-bold"
                        maxlength="1" style="width: 45px; height: 55px; font-size: 1.5rem;" autocomplete="off">
                    <input type="text"
                        class="form-control passcode-input text-center bg-dark text-primary border-secondary fw-bold"
                        maxlength="1" style="width: 45px; height: 55px; font-size: 1.5rem;" autocomplete="off">
                    <input type="text"
                        class="form-control passcode-input text-center bg-dark text-primary border-secondary fw-bold"
                        maxlength="1" style="width: 45px; height: 55px; font-size: 1.5rem;" autocomplete="off">
                    <input type="text"
                        class="form-control passcode-input text-center bg-dark text-primary border-secondary fw-bold"
                        maxlength="1" style="width: 45px; height: 55px; font-size: 1.5rem;" autocomplete="off">
                    <input type="text"
                        class="form-control passcode-input text-center bg-dark text-primary border-secondary fw-bold"
                        maxlength="1" style="width: 45px; height: 55px; font-size: 1.5rem;" autocomplete="off">
                    <input type="text"
                        class="form-control passcode-input text-center bg-dark text-primary border-secondary fw-bold"
                        maxlength="1" style="width: 45px; height: 55px; font-size: 1.5rem;" autocomplete="off">
                </div>

                <div id="joinError" class="text-danger small mb-3 min-height-20"></div>

                <div class="d-flex gap-3 mt-4">
                    <button class="btn btn-outline-secondary flex-grow-1" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary flex-grow-1" id="verifyBtn" onclick="verifyRoom()">Unlock
                        Room</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- templates/modals/room_info.html -->
<div class="modal fade" id="roomInfoModal" tabindex="-1" aria-labelledby="roomInfoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content glass-card border-secondary text-white">
            <div class="modal-header border-bottom border-secondary">
                <h5 class="modal-title d-flex align-items-center gap-2" id="roomInfoModalLabel">
                    <i class="fas fa-circle-info text-primary"></i>
                    Room Information
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <div class="row g-4">
                    <!-- Left Column: Icon & Header -->
                    <div class="col-md-5 text-center">
                        <div class="room-icon-large-container mb-3">
                            <img id="infoRoomIcon" src="" alt="Room Icon" class="rounded-circle border border-primary shadow-lg" 
                                 style="width: 180px; height: 180px; object-fit: cover; background: #10191E;">
                        </div>
                        <h2 id="infoRoomName" class="h3 fw-bold mb-1"></h2>
                        <div id="infoRoomPrivacyBadge" class="mb-3"></div>
                        
                        <div class="d-flex justify-content-center gap-3">
                            <div class="text-center">
                                <small class="text-muted d-block">Members</small>
                                <span id="infoMemberCount" class="fw-bold fs-5">0</span>
                            </div>
                            <div class="text-center">
                                <small class="text-muted d-block">Stars</small>
                                <span id="infoStarCount" class="fw-bold fs-5 text-warning">0</span>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Details -->
                    <div class="col-md-7">
                        <div class="info-section mb-4">
                            <h6 class="text-primary text-uppercase small fw-bold mb-2">Description</h6>
                            <p id="infoRoomDescription" class="text-white-50"></p>
                        </div>

                        <div class="info-grid row g-3">
                            <div class="col-6">
                                <h6 class="text-primary text-uppercase small fw-bold mb-1">Topic</h6>
                                <p id="infoRoomTopic" class="mb-0"></p>
                            </div>
                            <div class="col-6">
                                <h6 class="text-primary text-uppercase small fw-bold mb-1">Category</h6>
                                <p id="infoRoomCategory" class="mb-0"></p>
                            </div>
                            <div class="col-6">
                                <h6 class="text-primary text-uppercase small fw-bold mb-1">Created By</h6>
                                <p id="infoRoomCreator" class="mb-0"></p>
                            </div>
                            <div class="col-6">
                                <h6 class="text-primary text-uppercase small fw-bold mb-1">Created At</h6>
                                <p id="infoRoomDate" class="mb-0"></p>
                            </div>
                            <div class="col-12 mt-4">
                                <div class="bg-dark rounded-3 p-3 border border-secondary">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <span class="small text-muted">Room ID</span>
                                        <button class="btn btn-sm btn-link text-primary p-0 text-decoration-none" onclick="copyInfoRoomId()">
                                            <i class="far fa-copy me-1"></i>Copy
                                        </button>
                                    </div>
                                    <code id="infoRoomId" class="text-primary fw-bold" style="font-size: 1.1rem;"></code>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-top border-secondary gap-2">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Close</button>
                <button id="infoJoinBtn" class="btn btn-primary px-4 fw-bold">
                    <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Join Room
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .room-icon-large-container {
        padding: 10px;
        background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, rgba(0,0,0,0) 70%);
        display: inline-block;
        border-radius: 50%;
    }
</style>
